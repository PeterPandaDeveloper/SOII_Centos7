services:
  web-server:
    build: .
    container_name: centos_web
    ports:
      - "8080:80"
    volumes:
      - ./html:/var/www/html
    networks:
      servidores_net:
        ipv4_address: 192.168.0.100

networks:
  servidores_net:
    driver: bridge
    ipam:
      config:
        - subnet: 192.168.0.0/24